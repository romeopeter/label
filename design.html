});


/* ====== app.jsx ====== */
// Laybel app shell — top bar, left rail, panel host, canvas, timeline.

const TOOLS = [
  { key: "ai", label: "AI", icon: <IconSparkle size={18} /> },
  { key: "uploads", label: "Uploads", icon: <IconUpload size={18} /> },
  { key: "templates", label: "Templates", icon: <IconGrid size={18} /> },
  { key: "images", label: "Images", icon: <IconImage size={18} /> },
  { key: "annotation", label: "Annotation", icon: <IconPen size={18} /> },
  { key: "background", label: "Background", icon: <IconPattern size={18} /> },
  { key: "mockup", label: "Mockup", icon: <IconPhone size={18} /> },
  { key: "position", label: "Position", icon: <IconCrosshair size={18} /> },
  { key: "3d", label: "3D", icon: <IconCube size={18} /> },
  { key: "shadow", label: "Shadow", icon: <IconShadow size={18} /> },
  { key: "border", label: "Border", icon: <IconBorder size={18} /> },
  { key: "layout", label: "Layout", icon: <IconLayout size={18} />, pro: true },
  { key: "header", label: "Header", icon: <IconType size={18} /> },
  { key: "watermark", label: "Watermark", icon: <IconStamp size={18} /> },
  { key: "brands", label: "Brands", icon: <IconBrand size={18} />, pro: true },
  { key: "motion", label: "Motion", icon: <IconMotion size={18} />, exclusive: true },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "elementSelected": false,
  "showTimeline": true,
  "showProBadges": true,
  "gridDensity": "normal",
  "showWatermark": true
}/*EDITMODE-END*/;

function LaybelApp() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [activeTool, setActiveTool] = React.useState("images");
  const [hoverTool, setHoverTool] = React.useState(null);
  const [sizePickerOpen, setSizePickerOpen] = React.useState(false);
  const [exportOpen, setExportOpen] = React.useState(false);
  const [previewModalOpen, setPreviewModalOpen] = React.useState(false);
  const [customizeModalOpen, setCustomizeModalOpen] = React.useState(false);
  const [canvasSize, setCanvasSize] = React.useState("2400 × 1350");
  const [zoom, setZoom] = React.useState(62);

  // Motion / timeline state
  const [playing, setPlaying] = React.useState(false);
  const [time, setTime] = React.useState(0);
  const duration = 3.2;
  const [looping, setLooping] = React.useState(true);
  const [tlCollapsed, setTlCollapsed] = React.useState(false);
  const [selectedLayer, setSelectedLayer] = React.useState("title");

  // When paused at the start (time=0), show the finished composition so the
  // user sees the final design. Once they hit play or scrub, show real time.
  const effectiveTime = (!playing && time === 0) ? duration : time;

  const togglePlay = () => {
    if (playing) {
      setPlaying(false);
    } else {
      setTime(0);
      setPlaying(true);
    }
  };

  // Motion panel state
  const [entrance, setEntrance] = React.useState("Slide Up");
  const [exit, setExit] = React.useState("Fade Out");
  const [mDuration, setMDuration] = React.useState(8); // tenths
  const [mDelay, setMDelay] = React.useState(2);
  const [easing, setEasing] = React.useState("Ease Out");

  // Customize sidebar state
  const [hiddenTools, setHiddenTools] = React.useState({});

  const visibleTools = TOOLS.filter((t) => !hiddenTools[t.key]);

  const layers = [
    { id: "screenshot", label: "screenshot", anim: "Blur In", start: 0.0, end: 1.2 },
    { id: "title", label: "title", anim: "Slide Up", start: 0.4, end: 1.8 },
    { id: "label", label: "label", anim: "Pop", start: 0.9, end: 2.0 },
    { id: "arrow", label: "arrow", anim: "Draw", start: 1.4, end: 2.4 },
    { id: "badge", label: "badge", anim: "Fade In", start: 2.0, end: 3.0 },
  ];

  // Play loop
  React.useEffect(() => {
    if (!playing) return;
    let raf, last = performance.now();
    const tick = (now) => {
      const dt = (now - last) / 1000;
      last = now;
      setTime((t) => {
        let nt = t + dt;
        if (nt >= duration) {
          if (looping) nt = nt % duration;
          else { setPlaying(false); nt = duration; }
        }
        return nt;
      });
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [playing, looping, duration]);

  const closeAllOverlays = () => {
    setSizePickerOpen(false);
    setExportOpen(false);
  };

  // ESC closes modals
  React.useEffect(() => {
    const k = (e) => { if (e.key === "Escape") { setPreviewModalOpen(false); setCustomizeModalOpen(false); closeAllOverlays(); } };
    window.addEventListener("keydown", k);
    return () => window.removeEventListener("keydown", k);
  }, []);

  const renderPanel = () => {
    switch (activeTool) {
      case "ai": return <AiPanel />;
      case "uploads": return <UploadsPanel />;
      case "templates": return <TemplatesPanel />;
      case "images": return <ImagesPanel />;
      case "annotation": return <AnnotationPanel />;
      case "background": return <BackgroundPanel />;
      case "mockup": return <MockupPanel />;
      case "position": return <PositionPanel />;
      case "3d": return <ThreeDPanel />;
      case "shadow": return <ShadowPanel />;
      case "border": return <BorderPanel />;
      case "layout": return <LayoutPanel />;
      case "header": return <HeaderPanel />;
      case "watermark": return <WatermarkPanel />;
      case "brands": return <BrandsPanel />;
      case "motion": return <MotionPanel
        elementSelected={tweaks.elementSelected}
        entrance={entrance} setEntrance={setEntrance}
        exit={exit} setExit={setExit}
        duration={mDuration} setDuration={setMDuration}
        delay={mDelay} setDelay={setMDelay}
        easing={easing} setEasing={setEasing}
      />;
      default: return null;
    }
  };

  return (
    <div className="laybel-app" data-grid={tweaks.gridDensity} data-no-pro={tweaks.showProBadges ? undefined : "true"}>
      {/* TOP BAR */}
      <header className="topbar">
        <div className="topbar-left">
          <div className="logo">
            <div className="logo-mark">
              <div className="logo-tag logo-tag-back" />
              <div className="logo-tag logo-tag-mid" />
              <div className="logo-tag logo-tag-front" />
            </div>
            <span className="logo-word">Laybel</span>
          </div>
          <span className="free-pill">FREE</span>
        </div>

        <div className="topbar-center">
          <div className="topbar-tools">
            <button className="icon-btn" title="Undo"><IconUndo size={14} /></button>
            <button className="icon-btn" title="Redo"><IconRedo size={14} /></button>
            <div className="topbar-sep" />
            <button className="icon-btn" title="Preview" onClick={() => setPreviewModalOpen(true)}><IconEye size={14} /></button>
            <div className="topbar-sep" />
            <button className={"size-selector " + (sizePickerOpen ? "size-selector-open" : "")} onClick={() => { setSizePickerOpen(!sizePickerOpen); setExportOpen(false); }}>
              <span className="size-selector-val">{canvasSize} px</span>
              <IconChevDown size={12} />
            </button>
          </div>
          {sizePickerOpen && (
            <div className="dropdown-anchor">
              <CanvasSizePicker
                current={canvasSize}
                setCurrent={setCanvasSize}
                onClose={() => setSizePickerOpen(false)}
              />
            </div>
          )}
        </div>

        <div className="topbar-right">
          <button className="btn btn-ghost btn-sm">Save as Template</button>
          <button className={"btn btn-primary btn-sm " + (exportOpen ? "btn-active" : "")} onClick={() => { setExportOpen(!exportOpen); setSizePickerOpen(false); }}>
            <IconDownload size={13} /> Export
          </button>
          {exportOpen && (
            <div className="export-anchor">
              <ExportMenu onClose={() => setExportOpen(false)} />
            </div>
          )}
          <button className="icon-btn icon-btn-bell" title="Notifications">
            <IconBell size={14} />
            <span className="bell-dot" />
          </button>
          <button className="btn btn-teal-strong btn-sm">
            Sign In <IconArrowRight size={12} />
          </button>
        </div>
      </header>

      {/* MAIN */}
      <div className="laybel-main">
        {/* LEFT RAIL */}
        <nav className="rail">
          <div className="rail-scroll">
            {visibleTools.map((t) => (
              <button
                key={t.key}
                className={"rail-btn " + (activeTool === t.key ? "rail-btn-active" : "")}
                onMouseEnter={() => setHoverTool(t.key)}
                onMouseLeave={() => setHoverTool(null)}
                onClick={() => setActiveTool(t.key)}
              >
                <span className="rail-ic">{t.icon}</span>
                <span className="rail-lbl">{t.label}</span>
                {t.pro && tweaks.showProBadges && <span className="rail-pro-dot" />}
                {t.exclusive && <span className="rail-excl" />}
              </button>
            ))}
          </div>
          <div className="rail-bottom">
            <button className="rail-fab" title="Add">
              <IconPlus size={18} />
            </button>
            <div className="rail-divider" />
            <button className={"rail-btn rail-btn-customize " + (activeTool === "customize" ? "rail-btn-active" : "")} onClick={() => setActiveTool("customize")}>
              <span className="rail-ic"><IconGear size={18} /></span>
              <span className="rail-lbl">Customize</span>
            </button>
          </div>
        </nav>

        {/* PANEL */}
        <aside className="panel">
          {activeTool === "customize"
            ? <CustomizePanel onOpenModal={() => setCustomizeModalOpen(true)} />
            : renderPanel()}
        </aside>

        {/* CANVAS AREA */}
        <main className="canvas-area">
          <div className="canvas-wrap">
            <Canvas
              size={canvasSize}
              zoom={zoom}
              elementSelected={tweaks.elementSelected}
              showWatermark={tweaks.showWatermark}
              time={effectiveTime}
              duration={duration}
              layers={layers}
            />
          </div>

          {/* zoom controls */}
          <div className="zoom-controls">
            <button className="icon-btn-soft" onClick={() => setZoom(Math.max(20, zoom - 10))}>−</button>
            <span className="zoom-val">{zoom}%</span>
            <button className="icon-btn-soft" onClick={() => setZoom(Math.min(200, zoom + 10))}>+</button>
          </div>

          {/* feedback / shortcuts hint */}
          <div className="canvas-hints">
            <a className="hint-link">Share Feedback</a>
            <div className="hint-shortcuts">
              <KeyBadge>⌘V</KeyBadge> paste
              <KeyBadge>⌘E</KeyBadge> export
              <KeyBadge>Space</KeyBadge> pan
            </div>
          </div>

          {/* timeline */}
          {tweaks.showTimeline && (
            <div className="timeline-wrap">
              <TimelineBar
                playing={playing} setPlaying={togglePlay}
                time={time} setTime={(t) => { setPlaying(false); setTime(t); }}
                duration={duration}
                looping={looping} setLooping={setLooping}
                layers={layers}
                selectedLayer={selectedLayer}
                setSelectedLayer={setSelectedLayer}
                collapsed={tlCollapsed}
                setCollapsed={setTlCollapsed}
              />
            </div>
          )}
        </main>
      </div>

      {/* MODALS */}
      {previewModalOpen && <SocialPreviewModal onClose={() => setPreviewModalOpen(false)} />}
      {customizeModalOpen && (
        <CustomizeSidebarModal
          onClose={() => setCustomizeModalOpen(false)}
          tools={TOOLS.map((t) => ({ ...t, hidden: !!hiddenTools[t.key] }))}
          toggleVisible={(k) => setHiddenTools((h) => ({ ...h, [k]: !h[k] }))}
        />
      )}

      {/* SCRIM for top-bar dropdowns */}
      {(sizePickerOpen || exportOpen) && (
        <div className="overlay-scrim" onClick={() => { setSizePickerOpen(false); setExportOpen(false); }} />
      )}

      {/* TWEAKS PANEL */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Canvas state">
          <TweakToggle label="Element selected on canvas" value={tweaks.elementSelected} onChange={(v) => setTweak("elementSelected", v)} />
          <TweakToggle label="Show watermark" value={tweaks.showWatermark} onChange={(v) => setTweak("showWatermark", v)} />
          <TweakRadio label="Dotted grid" value={tweaks.gridDensity} options={["off", "normal", "dense"]} onChange={(v) => setTweak("gridDensity", v)} />
        </TweakSection>
        <TweakSection label="Chrome">
          <TweakToggle label="Show motion timeline bar" value={tweaks.showTimeline} onChange={(v) => setTweak("showTimeline", v)} />
          <TweakToggle label="Show PRO badges" value={tweaks.showProBadges} onChange={(v) => setTweak("showProBadges", v)} />
        </TweakSection>
        <TweakSection label="Quick states">
          <TweakButton label="Open canvas size picker" onClick={() => setSizePickerOpen(true)} />
          <TweakButton label="Open export menu" onClick={() => setExportOpen(true)} />
          <TweakButton label="Open social preview" onClick={() => setPreviewModalOpen(true)} />
          <TweakButton label="Open customize sidebar" onClick={() => setCustomizeModalOpen(true)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

// --- CANVAS (the artboard area) ---
function Canvas({ size, zoom, elementSelected, showWatermark, time, duration, layers }) {
  // Parse size into width/height to compute aspect ratio
  const [w, h] = (size.match(/\d+/g) || ["2400", "1350"]).map(Number);
  const aspect = w / h;
  const baseW = Math.min(820, 640 * (zoom / 62));
  const cw = baseW;
  const ch = baseW / aspect;

  // Find the title layer for animated demo
  const titleLayer = layers.find((l) => l.id === "title") || { start: 0.4, end: 1.8 };
  const titleProgress = Math.max(0, Math.min(1, (time - titleLayer.start) / (titleLayer.end - titleLayer.start)));
  const screenshotLayer = layers.find((l) => l.id === "screenshot") || { start: 0, end: 1.2 };
  const ssProgress = Math.max(0, Math.min(1, (time - screenshotLayer.start) / (screenshotLayer.end - screenshotLayer.start)));
  const arrowLayer = layers.find((l) => l.id === "arrow") || { start: 1.4, end: 2.4 };
  const arrowProgress = Math.max(0, Math.min(1, (time - arrowLayer.start) / (arrowLayer.end - arrowLayer.start)));

  // Element toolbar position above the artboard
  const toolbarTop = 12; // px from top of canvas-wrap

  return (
    <div className="canvas-stage">
      <div className="canvas-artboard" style={{ width: cw, height: ch }}>
        <div className="artboard-glow" />
        {/* Empty state */}
        {!elementSelected && (
          <div className="artboard-empty">
            <div className="empty-iconring">
              <IconUpload size={22} />
            </div>
            <div className="empty-title">Drop an image to begin</div>
            <div className="empty-sub">or paste <KeyBadge>⌘V</KeyBadge> from your clipboard</div>
            <div className="empty-orbtn">
              <span className="empty-or">or</span>
            </div>
            <button className="btn btn-primary btn-sm">
              <IconImage size={13} /> Browse templates
            </button>
          </div>
        )}

        {/* Selected element demo */}
        {elementSelected && (
          <div className="artboard-content">
            <div
              className="art-screenshot"
              style={{
                opacity: ssProgress,
                filter: `blur(${(1 - ssProgress) * 16}px)`,
                transform: `scale(${0.96 + ssProgress * 0.04})`,
              }}
            >
              <div className="art-screenshot-chrome">
                <span /><span /><span />
              </div>
              <div className="art-screenshot-body">
                <div className="art-ss-row art-ss-row-h" />
                <div className="art-ss-row art-ss-row-1" />
                <div className="art-ss-row art-ss-row-2" />
                <div className="art-ss-row art-ss-row-3" />
                <div className="art-ss-grid">
                  <div /><div /><div />
                </div>
              </div>
            </div>

            <div
              className="art-title"
              style={{
                opacity: titleProgress,
                transform: `translateY(${(1 - titleProgress) * 22}px)`,
              }}
            >
              Ship visuals,
              <br />not pixels.
            </div>

            <svg
              className="art-arrow"
              viewBox="0 0 200 120"
              style={{ opacity: arrowProgress > 0.05 ? 1 : 0 }}
            >
              <path
                d="M10 100 Q 60 20, 170 30"
                fill="none"
                stroke="#1D9E75"
                strokeWidth="3"
                strokeLinecap="round"
                strokeDasharray="260"
                strokeDashoffset={260 - 260 * arrowProgress}
              />
              <path
                d="M160 22 L 172 30 L 162 42"
                fill="none"
                stroke="#1D9E75"
                strokeWidth="3"
                strokeLinecap="round"
                strokeLinejoin="round"
                opacity={arrowProgress > 0.85 ? 1 : 0}
              />
            </svg>

            <div className="art-label" style={{ opacity: arrowProgress > 0.4 ? 1 : 0 }}>
              one-click hero
            </div>

            {/* selection bounding box */}
            <div className="art-select-box">
              <span className="sel-handle sel-tl" /><span className="sel-handle sel-tr" />
              <span className="sel-handle sel-bl" /><span className="sel-handle sel-br" />
              <span className="sel-handle sel-t" /><span className="sel-handle sel-b" />
              <span className="sel-handle sel-l" /><span className="sel-handle sel-r" />
            </div>
          </div>
        )}

        {showWatermark && (
          <div className="art-watermark">Made with Laybel</div>
        )}

        <div className="art-size-tag">{w} × {h}</div>
      </div>

      {/* element toolbar above artboard */}
      {elementSelected && (
        <div className="elem-toolbar-wrap" style={{ top: toolbarTop }}>
          <ElementToolbar />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LaybelApp />);
